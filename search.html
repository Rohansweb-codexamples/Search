<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Results - Rohans Web Search</title>

<script async src="https://cse.google.com/cse.js?cx=92604223b5a784f45"></script>

<style>
:root{
    --accent:#4caf50;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:white;
}

/* Header */
.header{
    position:sticky;
    top:0;
    z-index:100;
    background:white;
    border-bottom:1px solid #e5e5e5;
    padding:15px 25px;

    display:flex;
    align-items:center;
    gap:25px;
}

.logo img{
    height:90px;
    width:auto;
}

.search-wrap{
    flex:1;
}

/* Results */
.results{
    max-width:1800px;
    margin:auto;
    padding:25px;
}

.gsc-control-cse,
.gsc-control-wrapper-cse{
    border:none !important;
    background:transparent !important;
}

.gsc-input-box{
    border-radius:50px !important;
}

.gsc-search-button-v2{
    background:var(--accent) !important;
    border:none !important;
    border-radius:50% !important;
}

.gs-title{
    font-size:20px !important;
}

.gs-title a{
    color:#1a0dab !important;
}

.gsc-result{
    padding:12px 0 !important;
}
</style>
</head>
<body>

<div class="header">

    <a class="logo" href="index.html">
        <img src="https://projects.rohansweb.co.uk/logo.png" alt="Rohans Web Search">
    </a>

    <div class="search-wrap">
        <div class="gcse-searchbox-only"></div>
    </div>

</div>

<div class="results">
    <div class="gcse-searchresults-only"></div>
</div>

</body>
</html>
